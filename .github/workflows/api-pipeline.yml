name: FloQast API Pipeline

# Turns an external-ready OpenAPI spec into a governed, discoverable, agent-ready
# Postman asset. Stages map to the FloQast CSE pipeline jobs:
#
#   governance  -> Job 2: governance + linting quality gate (BLOCKING, always runs)
#   onboard     -> Jobs 1 & 3 & 4: import spec, sync workspace/collections/repo,
#                  publish to the discoverable catalog (gated on live Postman creds)
#   insights    -> Job 5: runtime observability (gated behind an explicit security sign-off)
#
# Governance is the hard gate: nothing reaches Postman unless the spec passes the
# "Stripe-level" ruleset. The live-Postman stages are gated on the POSTMAN_LIVE repo
# variable so the governance value is demonstrable before credentials are wired.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'postman/**'
      - '.postman/**'
      - '.github/workflows/ci.yml'
      - '**/*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      spec:
        description: Sample spec to run through the pipeline
        type: choice
        default: openapi/reconciliations.yaml
        options:
          - openapi/reconciliations.yaml          # agent-ready  (green gate, 100)
          - openapi/core-payments-openapi.yaml    # agent-ready  (green gate, 100)
          - openapi/close-tasks.yaml              # needs-work   (green gate, 70)
          - examples/non-compliant/legacy-internal-api.yaml  # FAILS gate (15 blockers, 17.5)

concurrency:
  # Scope by ref + spec so different specs run in parallel, while re-runs of the
  # same spec serialize (no race to provision the same Postman assets).
  group: floqast-api-pipeline-${{ github.ref }}-${{ github.event.inputs.spec || 'default' }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  pull-requests: write

env:
  # On manual runs, pick any sample spec; pushes/PRs use the default candidate.
  SPEC_PATH: ${{ github.event.inputs.spec || 'openapi/reconciliations.yaml' }}

jobs:
  # ---------------------------------------------------------------------------
  # JOB 2 (+6 scoring): Governance + linting quality gate. Always runs, blocking.
  # No Postman credentials required, so this proves value on day one.
  # ---------------------------------------------------------------------------
  governance:
    name: Governance gate
    runs-on: ubuntu-latest
    outputs:
      readiness-score: ${{ steps.readiness.outputs.score }}
      readiness-verdict: ${{ steps.readiness.outputs.verdict }}
    steps:
      - uses: actions/checkout@v5

      - name: Print pipeline banner
        run: |
          echo "::group::FloQast API Pipeline"
          cat <<'BANNER'
          ============================================================
            FloQast API Pipeline
            internal, UI-backed  ->  external, governed, agent-ready
          ------------------------------------------------------------
            Stage 1/3  Governance gate        (Stripe-level, BLOCKING)
            Stage 2/3  Onboard + catalog      (gated: POSTMAN_LIVE)
            Stage 3/3  Runtime insights        (gated: security sign-off)
          ============================================================
          BANNER
          echo "Candidate API: $SPEC_PATH"
          echo "::endgroup::"

      - name: Spectral governance lint (Stripe-level rules)
        id: lint
        run: |
          # Capture machine-readable findings; the renderer owns presentation + the gate.
          npx --yes @stoplight/spectral-cli@6 lint "$SPEC_PATH" \
            --ruleset governance/floqast.spectral.yaml \
            --format json --output spectral.json --fail-severity error || true
          # Renders the scorecard, inline annotations, and fails on any blocker.
          python3 scripts/render_governance.py spectral.json "$SPEC_PATH"

      - name: Agent-readiness score
        id: readiness
        if: always()
        # Advisory by default (governance is the hard gate). Set repo variable
        # READINESS_MIN_SCORE (e.g. 80) to turn agent-readiness into a hard gate too.
        run: |
          python3 scripts/agent_readiness.py "$SPEC_PATH" \
            --min-score "${{ vars.READINESS_MIN_SCORE || 0 }}"

      - name: Upload governance artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: governance-report
          path: |
            spectral.json
            agent-readiness.json
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # JOBS 1, 3, 4: Import spec -> workspace/collections/repo sync -> catalog publish.
  # Runs only on main, only when POSTMAN_LIVE=true, and only after governance passes.
  # ---------------------------------------------------------------------------
  onboard:
    name: Onboard to Postman + publish to catalog
    runs-on: ubuntu-latest
    needs: governance
    # Onboard only on explicit dispatch (per-service branch), never on push/PR.
    # This prevents accidental duplicate workspaces when main changes, and matches
    # the one-service-per-branch isolation model.
    if: github.event_name == 'workflow_dispatch' && vars.POSTMAN_LIVE == 'true'
    outputs:
      project-name: ${{ steps.meta.outputs.project-name }}
      workspace-id: ${{ steps.onboard.outputs.workspace-id }}
      environment-uids-json: ${{ steps.onboard.outputs.environment-uids-json }}
    steps:
      - uses: actions/checkout@v5

      - id: meta
        name: Derive project name from spec
        run: |
          base="$(basename "$SPEC_PATH")"
          echo "project-name=floqast-${base%.*}" >> "$GITHUB_OUTPUT"

      # Note: postman-resolve-service-token-action requires a *service-account* PMAK.
      # This pipeline runs with a standard admin PMAK, so we pass it directly to the
      # onboarding composite (postman-access-token is optional). To use a service
      # account instead, add a resolve-service-token step and wire its token/team-id.
      - id: onboard
        name: Bootstrap, sync, and link workspace (catalog foundation)
        uses: postman-cs/postman-api-onboarding-action@v1
        with:
          project-name: ${{ steps.meta.outputs.project-name }}
          spec-path: ${{ env.SPEC_PATH }}
          postman-region: us
          # Idempotency: reuse + update in place rather than versioning duplicates.
          collection-sync-mode: refresh
          spec-sync-mode: update
          environments-json: '["prod"]'
          # CI monitoring: schedule the cloud smoke monitor (default every 6h).
          monitor-cron: ${{ vars.POSTMAN_MONITOR_CRON || '0 */6 * * *' }}
          # System environments: associate Postman envs to team system environments
          # when a map of {env-slug: system-env-id} is provided. Needs team-defined
          # system environment IDs (see docs/PIPELINE.md, Job 3). repo-sync enables
          # environment-sync by default; this map is what activates it.
          system-env-map-json: ${{ vars.POSTMAN_SYSTEM_ENV_MAP || '{}' }}
          # Generated CI workflow is left off: pushing files under .github/workflows
          # needs a PAT with `workflow` scope (GITHUB_TOKEN is refused). Provide
          # gh-fallback-token + set this true to also drop a Postman CLI ci.yml.
          generate-ci-workflow: false
          repo-write-mode: commit-and-push
          # Insights is handled in its own gated job below, not here.
          enable-insights: false
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          # Access token enables repo-sync workspace linking (repo <-> workspace /
          # API Catalog integration via the Bifrost API). Without it, linking is skipped.
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ github.token }}

      - name: Publish to Private API Network (discovery)
        if: steps.onboard.outputs.workspace-id != ''
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          python3 scripts/publish_pan.py \
            "${{ steps.onboard.outputs.workspace-id }}" \
            "${{ steps.meta.outputs.project-name }}"

      - name: Onboarding summary
        if: always()
        run: |
          {
            echo "## Postman onboarding"
            echo ""
            echo "| Phase | Outcome |"
            echo "| --- | --- |"
            echo "| Bootstrap | ${{ steps.onboard.outputs.bootstrap-outcome }} |"
            echo "| Repo sync | ${{ steps.onboard.outputs.repo-sync-outcome }} |"
            echo ""
            echo "**Workspace:** ${{ steps.onboard.outputs.workspace-url }}"
            echo "**Spec ID:** ${{ steps.onboard.outputs.spec-id }}"
            echo "**Mock URL:** ${{ steps.onboard.outputs.mock-url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # JOB 5: Runtime observability (Insights). DOUBLE-GATED:
  #   - POSTMAN_LIVE=true (live Postman), AND
  #   - INSIGHTS_SECURITY_APPROVED=true (explicit security/privacy sign-off).
  # See docs/PIPELINE.md (Job 5) for the data-handling checkpoint that must be
  # completed before this is enabled against any production-like traffic.
  # ---------------------------------------------------------------------------
  insights:
    name: Runtime insights (security-gated)
    runs-on: ubuntu-latest
    needs: onboard
    if: github.event_name == 'workflow_dispatch' && vars.POSTMAN_LIVE == 'true' && vars.INSIGHTS_SECURITY_APPROVED == 'true'
    env:
      PROJECT: ${{ needs.onboard.outputs.project-name }}
      WORKSPACE_ID: ${{ needs.onboard.outputs.workspace-id }}
      # svc_* Insights project ID. Created once in the Postman UI (no API exists):
      # Workspace settings -> enable Insights -> Services -> Insights -> Create ->
      # choose container env (ECS). Copy the svc_ id into this repo variable.
      INSIGHTS_PROJECT_ID: ${{ vars.POSTMAN_INSIGHTS_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Insights agent + mock traffic
        id: capture
        continue-on-error: true
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          if [ -z "$INSIGHTS_PROJECT_ID" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Set repo variable POSTMAN_INSIGHTS_PROJECT_ID (svc_*) to run the agent."
            echo "The Insights agent requires an Insights project ID, which is created once in"
            echo "the Postman UI (enable Insights on the workspace -> Services -> Insights ->"
            echo "Create -> choose container env). There is no API to create it."
            exit 0
          fi

          # Local stand-in service for the FloQast API (mock traffic only, no real data).
          nohup python3 scripts/insights_mock_service.py 8080 > mock.log 2>&1 &
          for i in $(seq 1 10); do
            curl -fsS http://127.0.0.1:8080/reconciliations >/dev/null 2>&1 && break; sleep 1
          done

          bash -c "$(curl -L https://releases.observability.postman.com/scripts/install-postman-insights-agent.sh)"

          # apidump observes loopback HTTP and uploads characterized endpoints to the project.
          sudo --preserve-env=POSTMAN_API_KEY postman-insights-agent apidump \
            --project "$INSIGHTS_PROJECT_ID" --interfaces lo --filter "tcp port 8080" \
            > agent.log 2>&1 &
          AGENT_PID=$!

          end=$((SECONDS+90))
          while [ $SECONDS -lt $end ]; do
            curl -s http://127.0.0.1:8080/reconciliations >/dev/null
            curl -s http://127.0.0.1:8080/reconciliations/rec_1234 >/dev/null
            curl -s -X POST http://127.0.0.1:8080/reconciliations -H 'Content-Type: application/json' -d '{"account_name":"Cash - Operating","period":"2026-05","gl_balance":1999,"supporting_balance":1999}' >/dev/null
            curl -s http://127.0.0.1:8080/close-tasks >/dev/null
            sleep 0.3
          done

          sudo kill -INT "$AGENT_PID" 2>/dev/null || true
          sleep 15
          echo "===== agent.log (tail) ====="; tail -n 60 agent.log || true

      - name: Link discovered service to workspace + repo
        id: link
        if: steps.capture.outputs.skipped != 'true'
        continue-on-error: true
        uses: postman-cs/postman-insights-onboarding-action@v1
        with:
          project-name: ${{ env.PROJECT }}
          workspace-id: ${{ env.WORKSPACE_ID }}
          environment-id: ${{ fromJSON(needs.onboard.outputs.environment-uids-json).prod }}
          postman-region: us
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          poll-timeout-seconds: 180
          poll-interval-seconds: 15

      - name: Insights summary
        if: always()
        run: |
          {
            echo "## Runtime Insights (mock traffic)"
            echo ""
            if [ "${{ steps.capture.outputs.skipped }}" = "true" ]; then
              echo ":warning: **Prerequisite:** create an Insights project in the Postman UI and set"
              echo "repo variable \`POSTMAN_INSIGHTS_PROJECT_ID\` (svc_*). No API exists to create it."
            else
              echo "- **Agent capture:** ${{ steps.capture.outcome }} - Insights agent observed mock traffic to the local service"
              echo "- **Catalog link:** ${{ steps.link.outcome }} - status \`${{ steps.link.outputs.status }}\`"
              echo "- **Discovered service:** ${{ steps.link.outputs.discovered-service-name }} (id ${{ steps.link.outputs.discovered-service-id }})"
            fi
            echo ""
            echo "_Mock traffic only - no customer data. In production the agent runs as an ECS"
            echo "sidecar/daemon; see docs/PIPELINE.md (Job 5) data-protection checklist._"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Always-on pipeline map: tells the whole FloQast story in the run summary,
  # including which gated stages ran or were intentionally skipped (and why).
  # ---------------------------------------------------------------------------
  summary:
    name: Pipeline summary
    runs-on: ubuntu-latest
    needs: [governance, onboard, insights]
    if: always()
    steps:
      - name: Render pipeline map
        env:
          GOV: ${{ needs.governance.result }}
          ONB: ${{ needs.onboard.result }}
          INS: ${{ needs.insights.result }}
          SCORE: ${{ needs.governance.outputs.readiness-score }}
          VERDICT: ${{ needs.governance.outputs.readiness-verdict }}
        run: |
          icon() {
            case "$1" in
              success)  echo ":white_check_mark: passed" ;;
              failure)  echo ":x: failed" ;;
              skipped)  echo ":fast_forward: skipped" ;;
              cancelled) echo ":no_entry: cancelled" ;;
              *)        echo ":grey_question: $1" ;;
            esac
          }
          {
            echo "# FloQast API Pipeline - run summary"
            echo ""
            echo "From internal, UI-backed APIs to external, governed, agent-ready Postman assets."
            echo ""
            echo "| Stage | FloQast job | Result | Notes |"
            echo "| :-- | :-- | :-- | :-- |"
            echo "| 1. Governance gate | Job 2 (governance + linting) | $(icon "$GOV") | Stripe-level ruleset, blocking |"
            echo "| - Agent-readiness | Job 6 (MCP / agent-ready) | ${SCORE:-n/a}/100 ${VERDICT:+($VERDICT)} | UI-oriented vs agent-ready score |"
            echo "| 2. Onboard + catalog | Jobs 1, 3, 4 (import/sync/publish) | $(icon "$ONB") | Gated on \`POSTMAN_LIVE\` |"
            echo "| 3. Runtime insights | Job 5 (observability) | $(icon "$INS") | Gated on \`INSIGHTS_SECURITY_APPROVED\` |"
            echo ""
            if [ "$ONB" = "skipped" ]; then
              echo "> :information_source: The live-Postman stages are intentionally gated off."
              echo "> Set repo variable \`POSTMAN_LIVE=true\` (with a valid \`POSTMAN_API_KEY\`) to run import, sync, and catalog publish."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          # Fail the run only if governance failed; gated skips are expected.
          [ "$GOV" = "success" ] || exit 1
