name: Postman API Onboarding

# Idempotent onboarding pipeline.
# - Runs the full Postman onboarding suite (bootstrap -> repo sync -> smoke/contract tests -> Insights).
# - Re-runs reuse the existing workspace/spec/collections/mock/monitor instead of creating duplicates.
# - Commits pushed back with GITHUB_TOKEN do not re-trigger this workflow (GitHub blocks recursive
#   GITHUB_TOKEN triggers); paths-ignore is a second guard for any non-default-token pushes.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'postman/**'
      - '.postman/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

# Serialize runs so two pushes never race to provision the same Postman assets.
concurrency:
  group: postman-onboarding-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Mint a fresh service-account access token + resolve the team ID from the PMAK.
      # This is the canonical credential path and keeps the run idempotent and region-matched.
      - id: postman-token
        name: Resolve Postman service token
        uses: postman-cs/postman-resolve-service-token-action@v1
        with:
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-region: us

      - id: onboard
        name: Postman API onboarding
        uses: postman-cs/postman-api-onboarding-action@v1
        with:
          project-name: core-payments
          spec-path: openapi/core-payments-openapi.yaml
          postman-region: us

          # Idempotency controls: reuse + update in place rather than versioning new copies.
          collection-sync-mode: refresh
          spec-sync-mode: update
          environments-json: '["prod"]'

          # Keep this workflow the single source of truth; don't let the action drop a second ci.yml.
          generate-ci-workflow: false
          repo-write-mode: commit-and-push

          # Exercise the Insights linking action as part of the suite.
          enable-insights: true
          cluster-name: demo-cluster

          # Credentials. The access token + team id come from the service-token step above.
          # To use the pre-supplied token instead, swap the line below for:
          #   postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ steps.postman-token.outputs.token }}
          postman-team-id: ${{ steps.postman-token.outputs.team-id }}
          github-token: ${{ github.token }}

      - name: Onboarding summary
        if: always()
        run: |
          {
            echo "## Postman onboarding result"
            echo ""
            echo "| Phase | Outcome |"
            echo "| --- | --- |"
            echo "| Bootstrap | ${{ steps.onboard.outputs.bootstrap-outcome }} |"
            echo "| Repo sync | ${{ steps.onboard.outputs.repo-sync-outcome }} |"
            echo "| Insights | ${{ steps.onboard.outputs.insights-outcome }} (${{ steps.onboard.outputs.insights-status }}) |"
            echo ""
            echo "**Workspace:** ${{ steps.onboard.outputs.workspace-url }}"
            echo "**Spec ID:** ${{ steps.onboard.outputs.spec-id }}"
            echo "**Mock URL:** ${{ steps.onboard.outputs.mock-url }}"
            echo "**Monitor ID:** ${{ steps.onboard.outputs.monitor-id }}"
          } >> "$GITHUB_STEP_SUMMARY"
