type: http
name: Retrieve a reconciliation
url: '{{baseUrl}}/reconciliations/:reconciliationId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: reconciliationId
    value: string
    description: Unique identifier of the reconciliation.
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "rec_8f2a",
            "account_name": "Cash - Operating",
            "period": "2026-05",
            "gl_balance": 158230000,
            "supporting_balance": 158230000,
            "status": "in_review",
            "updated_at": "2026-06-02T11:20:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: The requested reconciliation.
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": "unauthorized",
            "message": "Missing or invalid bearer token"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Authentication failed or was not provided.
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": "not_found",
            "message": "No reconciliation matched the identifier"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: No resource matched the identifier.
