type: http
name: Retrieve a reconciliation
url: '{{baseUrl}}/reconciliations/:reconciliationId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: reconciliationId
    value: string
    description: Unique identifier of the reconciliation.
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "rec_8f2a",
            "account_name": "Cash - Operating",
            "period": "2026-05",
            "gl_balance": 158230000,
            "supporting_balance": 158230000,
            "status": "in_review",
            "updated_at": "2026-06-02T11:20:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: The requested reconciliation.
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": "unauthorized",
            "message": "Missing or invalid bearer token"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Authentication failed or was not provided.
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": "not_found",
            "message": "No reconciliation matched the identifier"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: No resource matched the identifier.
