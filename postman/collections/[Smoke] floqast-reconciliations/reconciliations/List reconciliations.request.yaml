type: http
name: List reconciliations
url: '{{baseUrl}}/reconciliations?status=open&period=string&limit=25&cursor=string'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: status
    value: open
    description: Filter by review status.
  - key: period
    value: string
    description: Accounting period in YYYY-MM format.
  - key: limit
    value: '25'
    description: Maximum number of reconciliations to return (1-100).
  - key: cursor
    value: string
    description: Opaque pagination cursor returned by a previous call.
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
