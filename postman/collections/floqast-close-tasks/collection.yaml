$schema: https://schema.postman.com/json/draft-2020-12/collection/v3.0.0/
type: collection
name: floqast-close-tasks
description: |-
  External-ready API for month-end close checklist tasks. This spec PASSES the FloQast governance gate (no blockers) but is intentionally only partly agent-ready: it omits response examples, leaves schema properties undocumented, and does not document error responses on read endpoints. The pipeline should let it through governance while flagging it as "needs-work" on the agent-readiness scorecard.

  Contact Support:
   Name: Close Platform Team
   Email: close-platform@floqast.example
id: ef437978-7eb8-439a-91ca-8478173c11b7
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{bearerToken}}'
      type: string
variables:
  - key: baseUrl
    value: https://api.floqast.example/v1
    type: any
items:
  - ref: ./close-tasks/folder.yaml
