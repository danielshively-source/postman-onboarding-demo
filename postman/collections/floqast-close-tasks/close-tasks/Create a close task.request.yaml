type: http
name: Create a close task
url: '{{baseUrl}}/close-tasks'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "string",
      "period": "string",
      "assignee_email": "string",
      "due_date": "1956-05-30"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "name": "string",
            "status": "in_progress",
            "period": "string",
            "assignee_email": "string",
            "due_date": "1994-04-29"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: The created close task.
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: The request was invalid.
